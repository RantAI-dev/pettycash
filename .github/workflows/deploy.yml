name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't let two deploys race for the same env; cancel-in-progress=false so a
# queued deploy will run after the in-flight one completes.
concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN:       ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:      ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID:  ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Preflight — required GitHub repo secrets
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ]      && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ]     && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub repo secrets: ${missing[*]}"
            echo "See README.md → 'Deploying to Vercel (via GitHub Actions)'."
            exit 1
          fi
          echo "All required GitHub secrets present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
